<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Beni Unutma"/>
<meta name="theme-color" content="#0f0f13"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/static/icon-192.png"/>
<title>Beni Unutma</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f13;
  --bg2:#1a1a24;
  --bg3:#22222f;
  --border:#2e2e3f;
  --accent:#7c6af7;
  --accent2:#a08fff;
  --green:#34d399;
  --red:#f87171;
  --amber:#fbbf24;
  --text:#f0f0f8;
  --text2:#9090b0;
  --text3:#5a5a7a;
  --radius:16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overflow:hidden}

/* Layout */
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#header{padding:20px 20px 0;flex-shrink:0}
#header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
#header h1 span{color:var(--accent)}
#tabs{display:flex;gap:8px;padding:16px 20px 0;flex-shrink:0}
.tab{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#content{flex:1;overflow-y:auto;padding:16px 20px;padding-bottom:calc(100px + var(--safe-bot))}

/* FAB */
#fab{position:fixed;bottom:calc(24px + var(--safe-bot));right:20px;width:60px;height:60px;border-radius:30px;background:var(--accent);border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(124,106,247,.5);z-index:100;transition:transform .15s}
#fab:active{transform:scale(.93)}

/* Cards */
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.task-card.done::before{background:var(--green)}
.task-title{font-size:16px;font-weight:600;margin-bottom:6px}
.task-time{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.task-time i{font-size:14px}
.task-actions{display:flex;gap:8px;margin-top:12px}
.btn-done{flex:1;padding:10px;border-radius:10px;border:none;background:rgba(52,211,153,.15);color:var(--green);font-size:14px;font-weight:600;cursor:pointer}
.btn-done:active{background:rgba(52,211,153,.3)}
.btn-del{width:44px;height:44px;border-radius:10px;border:none;background:rgba(248,113,113,.1);color:var(--red);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-del:active{background:rgba(248,113,113,.25)}
.done-badge{font-size:12px;color:var(--green);font-weight:600;margin-top:6px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:15px}

/* Modal */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#modal-bg.open{display:flex}
#modal{background:var(--bg2);border-radius:24px 24px 0 0;padding:24px 20px calc(24px + var(--safe-bot));width:100%;max-width:480px;animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal h2{font-size:20px;font-weight:700;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;outline:none}
.field input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;padding:14px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:600;cursor:pointer}
.btn-save{flex:2;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.btn-save:active{opacity:.85}

/* Login */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px}
#login-screen h1{font-size:32px;font-weight:800;margin-bottom:8px;text-align:center}
#login-screen p{color:var(--text2);margin-bottom:40px;text-align:center}
#login-screen input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;color:var(--text);font-size:18px;text-align:center;letter-spacing:4px;outline:none;margin-bottom:16px}
#login-screen input:focus{border-color:var(--accent)}
#btn-login{width:100%;padding:16px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
#login-err{color:var(--red);font-size:14px;margin-top:10px;text-align:center;min-height:20px}

/* Notif banner */
#notif-banner{background:rgba(124,106,247,.15);border:1px solid rgba(124,106,247,.3);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:none}
#notif-banner p{font-size:13px;color:var(--accent2);margin-bottom:8px}
#btn-allow{padding:8px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer}

/* Scrollbar */
#content::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <h1>🔔 Beni<br/>Unutma</h1>
  <p>Görev alarm uygulamasına<br/>hoş geldin</p>
  <input type="password" id="pw-input" placeholder="••••" autocomplete="current-password"/>
  <button id="btn-login">Giriş Yap</button>
  <div id="login-err"></div>
</div>

<!-- Ana uygulama -->
<div id="app" style="display:none">
  <div id="header">
    <h1>Beni <span>Unutma</span></h1>
  </div>

  <div id="tabs">
    <button class="tab active" onclick="showTab('pending')">⏳ Bekleyen</button>
    <button class="tab" onclick="showTab('done')">✅ Tamamlanan</button>
  </div>

  <div id="content">
    <div id="notif-banner">
      <p>📲 Bildirim iznini ver — telefon kapalıyken bile alarm çalsın!</p>
      <button id="btn-allow">Bildirimlere İzin Ver</button>
    </div>
    <div id="task-list"></div>
  </div>

  <button id="fab" onclick="openModal()">+</button>
</div>

<!-- Görev ekleme modal -->
<div id="modal-bg" onclick="closeModalBg(event)">
  <div id="modal">
    <h2>Yeni Görev</h2>
    <div class="field">
      <label>Görev</label>
      <input type="text" id="inp-title" placeholder="ne yapacaksın?"/>
    </div>
    <div class="field">
      <label>Tarih & Saat</label>
      <input type="datetime-local" id="inp-dt"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">İptal</button>
      <button class="btn-save" onclick="saveTask()">Kaydet</button>
    </div>
  </div>
</div>

<script>
const API = "";
let currentTab = "pending";
let tasks = {pending:[], done:[]};
let swReg = null;
let authed = sessionStorage.getItem("authed") === "1";

// ── Login ──────────────────────────────────────────────────────────────────
if (authed) showApp();

document.getElementById("btn-login").onclick = async () => {
  const pw = document.getElementById("pw-input").value;
  const r = await fetch("/api/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({password: pw})
  });
  const d = await r.json();
  if (d.ok) {
    sessionStorage.setItem("authed","1");
    showApp();
  } else {
    document.getElementById("login-err").textContent = "Hatalı şifre, tekrar dene.";
  }
};

document.getElementById("pw-input").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-login").click();
});

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  initApp();
}

// ── Init ───────────────────────────────────────────────────────────────────
async function initApp() {
  await registerSW();
  await loadTasks();
  setDefaultDateTime();
}

async function registerSW() {
  if (!("serviceWorker" in navigator)) return;
  try {
    swReg = await navigator.serviceWorker.register("/sw.js");
    await checkNotifPermission();
  } catch(e) { console.error(e); }
}

async function checkNotifPermission() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") {
    await subscribePush();
  } else if (Notification.permission !== "denied") {
    document.getElementById("notif-banner").style.display = "block";
    document.getElementById("btn-allow").onclick = requestNotif;
  }
}

async function requestNotif() {
  const perm = await Notification.requestPermission();
  if (perm === "granted") {
    document.getElementById("notif-banner").style.display = "none";
    await subscribePush();
  }
}

async function subscribePush() {
  if (!swReg) return;
  try {
    const r = await fetch("/api/vapid-public-key");
    const {key} = await r.json();
    if (!key) return;
    const sub = await swReg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(key)
    });
    await fetch("/api/subscribe", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(sub)
    });
  } catch(e) { console.error("Push subscribe error:", e); }
}

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,"+").replace(/_/g,"/");
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

// ── Tasks ──────────────────────────────────────────────────────────────────
async function loadTasks() {
  const r = await fetch("/api/tasks");
  tasks = await r.json();
  render();
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", (i===0 && tab==="pending") || (i===1 && tab==="done"));
  });
  render();
}

function render() {
  const list = document.getElementById("task-list");
  const items = tasks[currentTab] || [];

  if (items.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="icon">${currentTab==="pending" ? "📭" : "🎉"}</div>
      <p>${currentTab==="pending" ? "Bekleyen görev yok.<br/>+ ile yeni ekle!" : "Henüz tamamlanan görev yok."}</p>
    </div>`;
    return;
  }

  // Sort pending by alarm time
  const sorted = [...items].sort((a,b) => new Date(a.alarm) - new Date(b.alarm));

  list.innerHTML = sorted.map(t => {
    const dt = new Date(t.alarm);
    const fmt = dt.toLocaleString("tr-TR", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
    const isPast = currentTab==="pending" && dt < new Date();

    if (currentTab === "done") {
      const comp = t.completedAt ? new Date(t.completedAt).toLocaleString("tr-TR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
      return `<div class="task-card done">
        <div class="task-title">${escHtml(t.title)}</div>
        <div class="task-time">🕐 ${fmt}</div>
        ${comp ? `<div class="done-badge">✓ ${comp}'de tamamlandı</div>` : ""}
      </div>`;
    }

    return `<div class="task-card">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-time" style="color:${isPast?"var(--amber)":"var(--text2)"}">
        ${isPast?"⚠️":"🕐"} ${fmt}
      </div>
      <div class="task-actions">
        <button class="btn-done" onclick="markDone(${t.id})">✅ Yaptım!</button>
        <button class="btn-del" onclick="deleteTask(${t.id})">🗑</button>
      </div>
    </div>`;
  }).join("");
}

async function markDone(id) {
  await fetch(`/api/tasks/${id}/done`, {method:"POST"});
  playSuccess();
  await loadTasks();
}

async function deleteTask(id) {
  if (!confirm("Bu görevi silmek istediğine emin misin?")) return;
  await fetch(`/api/tasks/${id}`, {method:"DELETE"});
  await loadTasks();
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal() {
  setDefaultDateTime();
  document.getElementById("modal-bg").classList.add("open");
  setTimeout(() => document.getElementById("inp-title").focus(), 300);
}

function closeModal() {
  document.getElementById("modal-bg").classList.remove("open");
  document.getElementById("inp-title").value = "";
}

function closeModalBg(e) {
  if (e.target === document.getElementById("modal-bg")) closeModal();
}

function setDefaultDateTime() {
  const now = new Date(Date.now() + 60*60*1000);
  now.setSeconds(0,0);
  const local = new Date(now.getTime() - now.getTimezoneOffset()*60000)
    .toISOString().slice(0,16);
  document.getElementById("inp-dt").value = local;
}

async function saveTask() {
  const title = document.getElementById("inp-title").value.trim();
  const dtVal = document.getElementById("inp-dt").value;
  if (!title || !dtVal) { alert("Lütfen görev ve tarih gir!"); return; }

  // datetime-local is local time, append Istanbul offset manually
  const alarm = dtVal + ":00+03:00";
  await fetch("/api/tasks", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({title, alarm})
  });
  closeModal();
  showTab("pending");
  await loadTasks();
  playAdd();
}

// ── Sounds ─────────────────────────────────────────────────────────────────
function playAlarm() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const pattern = [0, 0.3, 0.6, 0.9, 1.4, 1.7, 2.0, 2.3];
  pattern.forEach(t => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = "square";
    o.frequency.setValueAtTime(880, ctx.currentTime + t);
    o.frequency.setValueAtTime(1100, ctx.currentTime + t + 0.1);
    g.gain.setValueAtTime(0.3, ctx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
    o.start(ctx.currentTime + t);
    o.stop(ctx.currentTime + t + 0.25);
  });
}

function playSuccess() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  [523, 659, 784].forEach((freq, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = "sine";
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.2, ctx.currentTime + i*0.12);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.3);
    o.start(ctx.currentTime + i*0.12);
    o.stop(ctx.currentTime + i*0.12 + 0.3);
  });
}

function playAdd() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = "sine";
  o.frequency.setValueAtTime(440, ctx.currentTime);
  o.frequency.linearRampToValueAtTime(880, ctx.currentTime + 0.15);
  g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  o.start(); o.stop(ctx.currentTime + 0.3);
}

// Alarm sound from service worker message
navigator.serviceWorker?.addEventListener("message", e => {
  if (e.data?.type === "playAlarm") playAlarm();
});

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
